<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Darko E-Commerce</title>
  <link rel="stylesheet" href="Styl.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <style>
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('Assets/dark_slide.webp'); background-size: cover; }
    .login-form { background: white; padding: 3rem; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); max-width: 400px; width: 90%; }
    .login-form h2 { text-align: center; margin-bottom: 2rem; color: #333; }
    .login-form input { width: 100%; padding: 1rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
    .login-form button { width: 100%; padding: 1rem; background: #000; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    .login-form button:hover { background: #333; }
    .error { color: red; text-align: center; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="login-container">
    <form class="login-form" id="loginForm">
      <h2><i class="fa-solid fa-lock"></i> Login</h2>
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login to Main Site</button>
      <p class="error" id="errorMsg">Invalid email or password!</p>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      if (email === 'admin@gmail.com' && password === '123456') { // Demo creds
        localStorage.setItem('user', JSON.stringify({email, loggedIn: true}));
        window.location.href = 'index.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    };
  </script>
</body>
</html>
